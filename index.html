<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/script.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>Librabry</h1>
    </div>
    
    <div class="main">
        <div class="button">
            <button class="open-dialog">New Book</button>
        </div>

        <div class="cards">

        </div>
    </div>

    <dialog closedby="any">
        <form action="">
            <div class="form-header">
                <h1>Add a new Book</h1>
                <p>Fill In the spaces with the description of your new Book</p>
            </div>
            <div class="author">
                <label for="author">Author</label>
                <input type="text" name="author" id="author" required>
            </div>
            <div class="title">
                <label for="title">Title</label>
                <input type="text" name="title" id="title" required>
            </div>
            <div class="pages">
                <label for="pages">Pages</label>
                <input type="number" name="pages" id="pages" required step="1">
            </div>
            <fieldset>
                <p><pre>Read: </pre></p>
                <label for="yes"><pre>Yes </pre></label>
                <input type="radio" name="read" id="yes" value="true" required>
                <label for="no"><pre>   No </pre></label>
                <input type="radio" name="read" id="no" value="false">
            </fieldset>

            <div class="buttons">
                <button type="submit" formmethod="dialog">Cancel</button>
                <button type="submit">Add Book</button>
            </div>
        </form>
    </dialog>
</body>
</html>
